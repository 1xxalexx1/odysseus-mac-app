<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odysseus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #272b35;
      --accent: #6c8cff;
      --accent-glow: rgba(108, 140, 255, 0.25);
      --text: #e2e6f0;
      --muted: #6b7280;
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ── Loading state ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeIn 0.4s ease;
    }

    .wordmark {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .wordmark span {
      color: var(--accent);
    }

    .spinner-wrap {
      position: relative;
      width: 56px;
      height: 56px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .ring-outer {
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .ring-inner {
      inset: 8px;
      border-top-color: rgba(108, 140, 255, 0.4);
      animation: spin 0.7s linear infinite reverse;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ── Error state ── */
    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 480px;
      padding: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }

    #error .icon {
      width: 48px;
      height: 48px;
      background: var(--error-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    #error h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    #error-msg {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      white-space: pre-wrap;
      background: rgba(0,0,0,0.2);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      width: 100%;
      font-family: "SF Mono", "Menlo", monospace;
    }

    #retry-btn {
      padding: 8px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #retry-btn:hover { opacity: 0.85; }

    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="wordmark">Odys<span>seus</span></div>
    <div class="spinner-wrap">
      <div class="ring ring-outer"></div>
      <div class="ring ring-inner"></div>
    </div>
    <p class="status">Starting server…</p>
  </div>

  <div id="error">
    <div class="icon">⚠</div>
    <h2>Server failed to start</h2>
    <pre id="error-msg"></pre>
    <button id="retry-btn" onclick="location.reload()">Retry</button>
    <p class="hint">
      Make sure the Odysseus venv is set up.<br>
      Run <code>./start-macos.sh</code> in the Odysseus directory once to install dependencies.
    </p>
  </div>

  <script>
    // Tauri v2 event API
    async function init() {
      try {
        const { listen } = window.__TAURI__.event;

        await listen('server-error', (event) => {
          document.getElementById('loading').style.display = 'none';
          const errEl = document.getElementById('error');
          errEl.style.display = 'flex';
          document.getElementById('error-msg').textContent = event.payload ?? 'Unknown error';
        });

        // Update status dots while waiting
        let dots = 0;
        setInterval(() => {
          dots = (dots + 1) % 4;
          const el = document.querySelector('.status');
          if (el) el.textContent = 'Starting server' + '.'.repeat(dots + 1);
        }, 600);
      } catch (e) {
        // __TAURI__ not available in plain browser — ignore
      }
    }

    init();
  </script>
</body>
</html>
